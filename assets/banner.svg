<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7f5af0"/>
      <stop offset="100%" style="stop-color:#2cb67d"/>
    </linearGradient>
    <linearGradient id="textGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e0e0ff"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
    <line x1="640" y1="0" x2="640" y2="200"/>
  </g>

  <!-- Decorative accent line -->
  <rect x="0" y="190" width="800" height="4" rx="2" fill="url(#accent)" opacity="0.8"/>

  <!-- Left decorative element: stacked agent icons -->
  <g transform="translate(80, 100)" opacity="0.15">
    <circle cx="-30" cy="-20" r="8" fill="#7f5af0"/>
    <circle cx="-10" cy="-35" r="8" fill="#2cb67d"/>
    <circle cx="10" cy="-20" r="8" fill="#7f5af0"/>
    <circle cx="-30" cy="5" r="8" fill="#2cb67d"/>
    <circle cx="-10" cy="20" r="8" fill="#7f5af0"/>
    <circle cx="10" cy="5" r="8" fill="#2cb67d"/>
  </g>

  <!-- Right decorative element: connection nodes -->
  <g transform="translate(720, 100)" opacity="0.15">
    <circle cx="0" cy="-30" r="6" fill="#7f5af0"/>
    <circle cx="25" cy="-10" r="6" fill="#2cb67d"/>
    <circle cx="25" cy="20" r="6" fill="#7f5af0"/>
    <circle cx="0" cy="30" r="6" fill="#2cb67d"/>
    <circle cx="-25" cy="20" r="6" fill="#7f5af0"/>
    <circle cx="-25" cy="-10" r="6" fill="#2cb67d"/>
    <line x1="0" y1="-30" x2="25" y2="-10" stroke="#7f5af0" stroke-width="1"/>
    <line x1="25" y1="-10" x2="25" y2="20" stroke="#2cb67d" stroke-width="1"/>
    <line x1="25" y1="20" x2="0" y2="30" stroke="#7f5af0" stroke-width="1"/>
    <line x1="0" y1="30" x2="-25" y2="20" stroke="#2cb67d" stroke-width="1"/>
    <line x1="-25" y1="20" x2="-25" y2="-10" stroke="#7f5af0" stroke-width="1"/>
    <line x1="-25" y1="-10" x2="0" y2="-30" stroke="#2cb67d" stroke-width="1"/>
  </g>

  <!-- T-Stack title -->
  <text x="400" y="90" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="56" font-weight="700" fill="url(#textGlow)" filter="url(#glow)" letter-spacing="2">T-Stack</text>

  <!-- Tagline -->
  <text x="400" y="130" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#a0a0c0" font-weight="400" letter-spacing="1">Multi-Agent Development Team for VS Code Copilot</text>

  <!-- Decorative dots -->
  <circle cx="305" cy="155" r="3" fill="#7f5af0" opacity="0.6"/>
  <circle cx="320" cy="155" r="3" fill="#2cb67d" opacity="0.6"/>
  <circle cx="335" cy="155" r="3" fill="#7f5af0" opacity="0.6"/>
  <circle cx="400" cy="155" r="3" fill="#2cb67d" opacity="0.6"/>
  <circle cx="465" cy="155" r="3" fill="#7f5af0" opacity="0.6"/>
  <circle cx="480" cy="155" r="3" fill="#2cb67d" opacity="0.6"/>
  <circle cx="495" cy="155" r="3" fill="#7f5af0" opacity="0.6"/>
</svg>

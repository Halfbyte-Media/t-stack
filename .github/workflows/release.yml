name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate version consistency
        run: |
          FRAMEWORK_VERSION=$(cat src/.tstack/.version | tr -d '[:space:]')
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$TAG_VERSION" != "$FRAMEWORK_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION doesn't match src/.tstack/.version '$FRAMEWORK_VERSION'"
            exit 1
          fi
          echo "Version matches: v$TAG_VERSION"

      - name: Create ZIP
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cd src && zip -r ../t-stack-v${VERSION}.zip .github .tstack

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          generate_release_notes: true
          body: |
            Download `t-stack-${{ github.ref_name }}.zip` for manual installation. Extract into your project root — see README for details.

            ---
          files: t-stack-v*.zip

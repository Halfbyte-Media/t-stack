name: Publish CLI to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Validate version consistency
        run: |
          FRAMEWORK_VERSION=$(cat src/.tstack/.version | tr -d '[:space:]')
          CLI_VERSION=$(node -e "console.log(require('./packages/cli/package.json').version)")
          if [ "$FRAMEWORK_VERSION" != "$CLI_VERSION" ]; then
            echo "::error::Version mismatch: src/.tstack/.version is '$FRAMEWORK_VERSION' but packages/cli/package.json is '$CLI_VERSION'"
            exit 1
          fi
          echo "Versions match: $FRAMEWORK_VERSION"
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$TAG_VERSION" != "$CLI_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION doesn't match CLI version $CLI_VERSION"
            exit 1
          fi
          echo "Tag matches: v$TAG_VERSION"

      - name: Copy payload
        run: |
          mkdir -p packages/cli/files
          cp -r src/.github packages/cli/files/.github
          cp -r src/.tstack packages/cli/files/.tstack

      - name: Verify payload
        run: |
          FILE_COUNT=$(find packages/cli/files -type f | wc -l)
          if [ "$FILE_COUNT" -lt 26 ]; then
            echo "::error::Expected at least 26 payload files, found $FILE_COUNT"
            exit 1
          fi
          echo "Payload verified: $FILE_COUNT files"

      - name: Publish
        working-directory: packages/cli
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
